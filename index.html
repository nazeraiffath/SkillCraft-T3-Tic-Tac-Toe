<!DOCTYPE html>
<html>

<head>

<title>Neon Tic Tac Toe</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
TIC TAC TOE
</h1>


<div class="subtitle">

You are <span>X</span> | System is O

</div>



<div class="game">



<div class="card">


<h2>🏆 SCORE</h2>


<div class="score">

You X

<b id="xScore">0</b>

</div>


<div class="score">

System O

<b id="oScore">0</b>

</div>


<div class="score">

Draw

<b id="draw">0</b>

</div>


</div>







<div>


<div class="board">


<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>


<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>


<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>


</div>



<h2 id="message">

Your Turn

</h2>


<button onclick="restart()">

PLAY AGAIN

</button>


</div>








<div class="card">


<h2>
ⓘ GAME INFO
</h2>


<p>

Current Turn

</p>


<h2 id="turn">

YOU

</h2>


<br>


<p>

Game Status

</p>


<h2 id="status">

Playing

</h2>


</div>



</div>


</div>



<script src="script.js"></script>


</body>

</html>
